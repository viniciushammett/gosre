version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    staticcheck:
      checks:
        - "all"
        - "-S1016"

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: internal/channel/webhook\.go
      linters:
        - staticcheck
      text: "S1016"
