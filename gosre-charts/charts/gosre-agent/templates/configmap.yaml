apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gosre-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-agent.labels" . | nindent 4 }}
data:
  GOSRE_API_URL: {{ .Values.env.apiURL | quote }}
  GOSRE_AGENT_ID: {{ .Values.env.agentID | quote }}
  GOSRE_POLL_INTERVAL: {{ .Values.env.pollInterval | quote }}
  GOSRE_LOG_LEVEL: {{ .Values.env.logLevel | quote }}
