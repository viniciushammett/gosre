apiVersion: v1
kind: Service
metadata:
  name: {{ include "gosre-auth.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-auth.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "gosre-auth.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
