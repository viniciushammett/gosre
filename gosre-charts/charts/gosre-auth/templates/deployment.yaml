apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gosre-auth.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-auth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gosre-auth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gosre-auth.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gosre-auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: PORT
            - name: GOSRE_REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: GOSRE_REDIS_URL
            - name: GITHUB_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: GITHUB_REDIRECT_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: database-url
            - name: GOSRE_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: github-client-id
            - name: GOSRE_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-auth.fullname" . }}
                  key: github-client-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
