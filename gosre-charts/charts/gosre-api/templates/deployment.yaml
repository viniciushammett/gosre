apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gosre-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gosre-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gosre-api.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gosre-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GOSRE_DB_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: GOSRE_DB_PATH
            - name: GOSRE_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: GOSRE_LOG_LEVEL
            - name: GOSRE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: api-key
            - name: GOSRE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: database-url
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: NATS_URL
            - name: GOSRE_CATALOG_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gosre-api.fullname" . }}
                  key: GOSRE_CATALOG_URL
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gosre-api.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
