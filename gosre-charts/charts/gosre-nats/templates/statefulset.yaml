apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gosre-nats.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-nats.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "gosre-nats.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "gosre-nats.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gosre-nats.labels" . | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config=/etc/nats/nats.conf"
          ports:
            - name: client
              containerPort: {{ .Values.service.clientPort }}
            - name: cluster
              containerPort: {{ .Values.service.clusterPort }}
            - name: monitor
              containerPort: {{ .Values.service.monitorPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "gosre-nats.fullname" . }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
