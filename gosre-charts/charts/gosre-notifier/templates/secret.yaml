apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gosre-notifier.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosre-notifier.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.apiKey | b64enc | quote }}
  redis-password: {{ .Values.redisPassword | b64enc | quote }}
