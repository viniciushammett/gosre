openapi: "3.0.3"

info:
  title: GoSRE API
  description: REST API for the GoSRE monitoring platform.
  version: "0.1.0"

servers:
  - url: /api/v1
    description: API v1

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthz
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "0.1.0"

  /targets:
    get:
      summary: List targets
      operationId: listTargets
      tags: [targets]
      security:
        - apiKey: []
      responses:
        "200":
          description: List of targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      summary: Create a target
      operationId: createTarget
      tags: [targets]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Target"
      responses:
        "201":
          description: Target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /targets/{id}:
    parameters:
      - $ref: "#/components/parameters/id"

    get:
      summary: Get a target
      operationId: getTarget
      tags: [targets]
      security:
        - apiKey: []
      responses:
        "200":
          description: Target found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete a target
      operationId: deleteTarget
      tags: [targets]
      security:
        - apiKey: []
      responses:
        "204":
          description: Target deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /checks:
    get:
      summary: List check configs
      operationId: listChecks
      tags: [checks]
      security:
        - apiKey: []
      responses:
        "200":
          description: List of check configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckConfigListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      summary: Create a check config
      operationId: createCheck
      tags: [checks]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckConfig"
      responses:
        "201":
          description: Check config created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /checks/{id}/run:
    parameters:
      - $ref: "#/components/parameters/id"

    post:
      summary: Execute a check immediately
      operationId: runCheck
      tags: [checks]
      security:
        - apiKey: []
      responses:
        "200":
          description: Check executed, result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /results:
    get:
      summary: List results
      operationId: listResults
      tags: [results]
      security:
        - apiKey: []
      parameters:
        - name: target_id
          in: query
          required: false
          schema:
            type: string
          description: Filter by target ID
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /results/{id}:
    parameters:
      - $ref: "#/components/parameters/id"

    get:
      summary: Get a result
      operationId: getResult
      tags: [results]
      security:
        - apiKey: []
      responses:
        "200":
          description: Result found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /incidents:
    get:
      summary: List incidents
      operationId: listIncidents
      tags: [incidents]
      security:
        - apiKey: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IncidentState"
          description: Filter by state. Omit to return all incidents.
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /incidents/{id}:
    parameters:
      - $ref: "#/components/parameters/id"

    patch:
      summary: Update incident state
      operationId: patchIncident
      tags: [incidents]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  $ref: "#/components/schemas/IncidentState"
      responses:
        "200":
          description: Incident updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents:
    get:
      summary: List registered agents
      operationId: listAgents
      tags: [agents]
      security:
        - apiKey: []
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents/register:
    post:
      summary: Register an agent
      operationId: registerAgent
      tags: [agents]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAgentRequest"
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents/{id}/assignments:
    parameters:
      - $ref: "#/components/parameters/id"

    get:
      summary: Get check assignments for an agent
      operationId: getAgentAssignments
      tags: [agents]
      security:
        - apiKey: []
      responses:
        "200":
          description: List of check assignments for the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agents/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/id"

    post:
      summary: Send agent heartbeat
      operationId: agentHeartbeat
      tags: [agents]
      security:
        - apiKey: []
      responses:
        "204":
          description: Heartbeat acknowledged
        "404":
          $ref: "#/components/responses/NotFound"

  /slos:
    get:
      summary: List SLOs for a target
      operationId: listSLOs
      tags: [slos]
      security:
        - bearerAuth: []
      parameters:
        - name: target_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of SLOs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLOListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      summary: Create a SLO
      operationId: createSLO
      tags: [slos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SLO"
      responses:
        "201":
          description: SLO created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLOResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /slos/{id}:
    get:
      summary: Get a SLO by ID
      operationId: getSLO
      tags: [slos]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: SLO found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLOResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a SLO
      operationId: deleteSLO
      tags: [slos]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: SLO deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /slos/{id}/budget:
    get:
      summary: Get error budget for a SLO
      operationId: getSLOBudget
      tags: [slos]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Error budget result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /notification/channels:
    get:
      summary: List notification channels for a project
      operationId: listNotificationChannels
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of notification channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannelListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      summary: Create a notification channel
      operationId: createNotificationChannel
      tags: [notifications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationChannel"
      responses:
        "201":
          description: Notification channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannelResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /notification/channels/{id}:
    get:
      summary: Get a notification channel by ID
      operationId: getNotificationChannel
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Notification channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannelResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a notification channel
      operationId: deleteNotificationChannel
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Notification channel deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /notification/rules:
    get:
      summary: List notification rules for a project
      operationId: listNotificationRules
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of notification rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRuleListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      summary: Create a notification rule
      operationId: createNotificationRule
      tags: [notifications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRule"
      responses:
        "201":
          description: Notification rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRuleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /notification/rules/{id}:
    get:
      summary: Get a notification rule by ID
      operationId: getNotificationRule
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Notification rule found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRuleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a notification rule
      operationId: deleteNotificationRule
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Notification rule deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /scheduler/status:
    get:
      summary: Get scheduler assignment distribution
      operationId: getSchedulerStatus
      tags: [scheduler]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current scheduler status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SchedulerStatus"
                  error:
                    $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    # ── Domain types ──────────────────────────────────────────────────────────

    TargetType:
      type: string
      enum: [http, tcp, dns, tls]

    Target:
      type: object
      required: [name, type, address]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/TargetType"
        address:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        project_id:
          type: string
          description: Project this target belongs to.
        service_id:
          type: string
          nullable: true
          description: Optional reference to a gosre-catalog service ID.

    CheckType:
      type: string
      enum: [http, tcp, dns, tls]

    CheckConfig:
      type: object
      required: [type, target_id]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/CheckType"
        target_id:
          type: string
        interval:
          type: integer
          description: Check interval in nanoseconds (time.Duration).
        timeout:
          type: integer
          description: Check timeout in nanoseconds (time.Duration).
        params:
          type: object
          additionalProperties:
            type: string

    CheckStatus:
      type: string
      enum: [ok, fail, timeout, unknown]

    Result:
      type: object
      properties:
        id:
          type: string
        check_id:
          type: string
        target_id:
          type: string
        agent_id:
          type: string
        status:
          $ref: "#/components/schemas/CheckStatus"
        duration_ms:
          type: integer
          description: Check duration in nanoseconds (time.Duration serialized as int64).
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string
        target_name:
          type: string
          description: Snapshot of the target name at the time the check was executed.

    IncidentState:
      type: string
      enum: [open, acknowledged, resolved]

    Incident:
      type: object
      properties:
        id:
          type: string
        target_id:
          type: string
        state:
          $ref: "#/components/schemas/IncidentState"
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        result_ids:
          type: array
          items:
            type: string

    # ── Response envelope ─────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    TargetResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Target"
        error:
          $ref: "#/components/schemas/Error"

    TargetListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Target"
        error:
          $ref: "#/components/schemas/Error"

    CheckConfigResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CheckConfig"
        error:
          $ref: "#/components/schemas/Error"

    CheckConfigListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CheckConfig"
        error:
          $ref: "#/components/schemas/Error"

    ResultResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Result"
        error:
          $ref: "#/components/schemas/Error"

    ResultListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Result"
        error:
          $ref: "#/components/schemas/Error"

    IncidentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Incident"
        error:
          $ref: "#/components/schemas/Error"

    IncidentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Incident"
        error:
          $ref: "#/components/schemas/Error"

    RegisterAgentRequest:
      type: object
      required: [hostname, version]
      properties:
        hostname:
          type: string
        version:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: string
        hostname:
          type: string
        version:
          type: string
        last_seen:
          type: string
          format: date-time

    AgentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Agent"
        error:
          $ref: "#/components/schemas/Error"

    AgentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        error:
          $ref: "#/components/schemas/Error"

    Assignment:
      type: object
      properties:
        check_id:
          type: string
        target_id:
          type: string
        type:
          $ref: "#/components/schemas/CheckType"

    AssignmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
        error:
          $ref: "#/components/schemas/Error"

    SLO:
      type: object
      required: [target_id, name, metric, threshold, window_seconds]
      properties:
        id:
          type: string
        target_id:
          type: string
        name:
          type: string
        metric:
          type: string
          description: e.g. "availability"
        threshold:
          type: number
          format: double
          description: e.g. 0.999 for 99.9%
        window_seconds:
          type: integer
          format: int64
          description: Observation window in seconds (e.g. 86400 for 24h)

    SLOResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SLO"
        error:
          $ref: "#/components/schemas/Error"

    SLOListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SLO"
        error:
          $ref: "#/components/schemas/Error"

    BudgetResult:
      type: object
      properties:
        slo_id:
          type: string
        target_id:
          type: string
        compliance:
          type: number
          format: double
        burn_rate_1h:
          type: number
          format: double
        burn_rate_6h:
          type: number
          format: double
        burn_rate_24h:
          type: number
          format: double
        insufficient_data:
          type: boolean
        total_results:
          type: integer

    BudgetResultResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BudgetResult"
        error:
          $ref: "#/components/schemas/Error"

    NotificationChannelKind:
      type: string
      enum: [slack, email, webhook]

    NotificationChannel:
      type: object
      required: [project_id, name, kind]
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        kind:
          $ref: "#/components/schemas/NotificationChannelKind"
        config:
          type: object
          additionalProperties:
            type: string

    NotificationChannelResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NotificationChannel"
        error:
          $ref: "#/components/schemas/Error"

    NotificationChannelListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
        error:
          $ref: "#/components/schemas/Error"

    NotificationRule:
      type: object
      required: [project_id, channel_id, event_kind]
      properties:
        id:
          type: string
        project_id:
          type: string
        channel_id:
          type: string
        event_kind:
          type: string
          description: NATS subject name, e.g. "gosre.incidents.opened"
        tag_filter:
          type: array
          items:
            type: string
          description: Match against target tags. Empty matches all.

    NotificationRuleResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NotificationRule"
        error:
          $ref: "#/components/schemas/Error"

    NotificationRuleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationRule"
        error:
          $ref: "#/components/schemas/Error"

    SchedulerStatus:
      type: object
      properties:
        agents_active:
          type: integer
        agents_down:
          type: integer
        total_checks:
          type: integer
        assignments_per_agent:
          type: object
          additionalProperties:
            type: integer

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TargetResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TargetResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TargetResponse"
