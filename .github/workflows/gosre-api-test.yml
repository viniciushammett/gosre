name: gosre-api test

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: test
        working-directory: gosre-api
        env:
          GOWORK: 'off'
        run: go test -race -cover ./...
