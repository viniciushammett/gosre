name: gosre-scheduler test

"on":
  pull_request:
    paths:
      - 'gosre-scheduler/**'
      - 'gosre-sdk/**'
      - 'gosre-events/**'
  push:
    branches: [main]
    paths:
      - 'gosre-scheduler/**'
      - 'gosre-sdk/**'
      - 'gosre-events/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: gosre-scheduler/go.sum

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-scheduler-${{ hashFiles('gosre-scheduler/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-scheduler-

      - name: test
        working-directory: gosre-scheduler
        env:
          GOWORK: 'off'
        run: go test -race -cover ./...
