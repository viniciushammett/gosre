name: gosre-agent lint

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('gosre-agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: lint
        working-directory: gosre-agent
        env:
          GOWORK: 'off'
        run: golangci-lint run ./...
