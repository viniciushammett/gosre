name: gosre-sdk test

"on":
  pull_request:
    paths:
      - 'gosre-sdk/**'
  push:
    branches: [main]
    paths:
      - 'gosre-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: false

      - name: test
        working-directory: gosre-sdk
        env:
          GOWORK: 'off'
        run: go test -race -cover ./...
