name: gosre-api lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: gosre-api
          version: v2.1.6
        env:
          GOWORK: 'off'
