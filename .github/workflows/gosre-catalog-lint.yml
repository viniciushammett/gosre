name: gosre-catalog lint

"on":
  pull_request:
    paths:
      - 'gosre-catalog/**'
      - 'gosre-sdk/**'
  push:
    branches: [main]
    paths:
      - 'gosre-catalog/**'
      - 'gosre-sdk/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: false

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-catalog-${{ hashFiles('gosre-catalog/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-catalog-

      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: lint
        working-directory: gosre-catalog
        env:
          GOWORK: 'off'
        run: golangci-lint run ./...
