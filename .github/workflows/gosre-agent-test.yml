name: gosre-agent test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: test
        working-directory: gosre-agent
        env:
          GOWORK: 'off'
        run: go test -race -cover ./...
