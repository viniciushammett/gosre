name: gosre-agent test

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('gosre-agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: test
        working-directory: gosre-agent
        env:
          GOWORK: 'off'
        run: go test -race -cover ./...
